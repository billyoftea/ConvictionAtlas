server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name 47.76.120.0.sslip.io;

  ssl_certificate /etc/letsencrypt/live/47.76.120.0.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/47.76.120.0.sslip.io/privkey.pem;
  ssl_session_cache shared:SSL:1m;
  ssl_session_timeout 10m;
  ssl_ciphers PROFILE=SYSTEM;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html/conviction-atlas;
  index index.html;

  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  location /_next/ {
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /docs {
    proxy_pass http://127.0.0.1:3001/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    proxy_pass http://127.0.0.1:3001/docs/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /docs-json {
    proxy_pass http://127.0.0.1:3001/docs-json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
